<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery 💖</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  font-family: 'Nunito', sans-serif;
  text-align: center;

  background: url("assets/bg5.jpg") no-repeat center center;
  background-size: cover;

  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

body.show {
  opacity: 1;
  transform: translateY(0);
}

h1 {
  padding: 32px 20px 0;
  color: #f9f7f7;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(22px, 5.5vw, 36px);
}

/* Gallery grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(240px, 80vw), 1fr));
  gap: clamp(16px, 4vw, 30px);
  max-width: 900px;
  margin: 32px auto 0;
  padding: 0 20px;
  justify-items: center;
}

/* Photo card */
.photo {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  transform: rotate(-4deg);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  width: 100%;
  max-width: 280px;
}

.photo:nth-child(even) {
  transform: rotate(4deg);
}

.photo:hover, .photo:focus-within {
  transform: scale(1.08) rotate(0deg);
  box-shadow: 0 16px 36px rgba(0,0,0,0.3);
}

.photo img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
}

/* Next button */
.next-btn {
  display: block;
  margin: 36px auto 48px;
  padding: clamp(11px, 2.5vw, 14px) clamp(28px, 7vw, 48px);
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 700;
  font-family: 'Nunito', sans-serif;

  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;

  box-shadow: 0 0 14px rgba(255,77,109,0.6);
  animation: pulse 1.5s infinite, floatBtn 2s ease-in-out infinite;
  transition: transform 0.2s;
}

.next-btn:hover, .next-btn:active {
  transform: scale(1.08);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,77,109,0.6); }
  50%       { box-shadow: 0 0 28px rgba(255,77,109,1);   }
}

@keyframes floatBtn {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

</style>
</head>
<body>

<h1>Sudhu loves you sooo muchh Abinoooo 💖</h1>

<div class="gallery">
  <div class="photo"><img src="assets/Img1.jpeg" alt="Memory 1"></div>
  <div class="photo"><img src="assets/Img2.jpeg" alt="Memory 2"></div>
  <div class="photo"><img src="assets/Img3.jpeg" alt="Memory 3"></div>
</div>

<button class="next-btn" onclick="goTo('like.html')">Next ➜</button>

<script>
window.onload = () => { document.body.classList.add("show"); };

function goTo(page) {
  document.body.classList.remove("show");
  setTimeout(() => { window.location.href = page; }, 400);
}
</script>
</body>
</html>
