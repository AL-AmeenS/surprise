<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  transition: background 0.6s ease;
  background: url("assets/bg4.jpg") no-repeat center center;
  background-size: cover;
}

.opened-bg {
  background-image: url("assets/bg5.jpg") !important;
}

/* Letter popup */
.popup {
  position: absolute;
  width: clamp(240px, 70vw, 480px);
  height: auto;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 2;
}

.popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* Open button */
.open-btn {
  position: fixed;
  bottom: clamp(60px, 12vh, 100px);
  left: 50%;
  transform: translateX(-50%);
  padding: clamp(10px, 2.5vw, 13px) clamp(28px, 7vw, 44px);
  background: #7a0c0c;
  color: white;
  border: none;
  border-radius: 25px;
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  cursor: pointer;
  z-index: 3;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.open-btn:hover, .open-btn:active {
  transform: translateX(-50%) scale(1.08);
}

/* Next button */
.next-btn {
  position: fixed;
  bottom: clamp(20px, 5vh, 40px);
  left: 50%;
  transform: translateX(-50%);
  padding: clamp(11px, 2.5vw, 14px) clamp(30px, 7vw, 48px);
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  display: none;
  z-index: 3;

  box-shadow: 0 0 14px rgba(255,77,109,0.7);
  animation: pulse 1.5s infinite, floatBtn 2s ease-in-out infinite;
}

.next-btn:hover { transform: translateX(-50%) scale(1.08); }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,77,109,0.6); }
  50%       { box-shadow: 0 0 28px rgba(255,77,109,1);   }
}

@keyframes floatBtn {
  0%, 100% { transform: translateX(-50%) translateY(0);    }
  50%       { transform: translateX(-50%) translateY(-6px); }
}

</style>
</head>
<body id="body">

<img src="assets/Letter.png" id="popup" class="popup" alt="Letter">

<button class="open-btn" id="openBtn" onclick="openLetter()">Opennn !</button>
<button class="next-btn"  id="nextBtn" onclick="goNext()">Next ➜</button>

<script>
function openLetter() {
  document.getElementById("body").classList.add("opened-bg");
  document.getElementById("popup").classList.add("show");
  document.getElementById("openBtn").style.display = "none";
  document.getElementById("nextBtn").style.display  = "block";
}

function goNext() {
  window.location.href = "gallery.html";
}
</script>
</body>
</html>
