
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  transition: background 0.6s ease;
  background: #730F0F;
}

/* Opened background */
.opened-bg {
  background: url("assets/bg5.jpg") no-repeat center center !important;
  background-size: cover !important;
}

/* Closed heading */
.closed-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(26px, 6vw, 48px);
  color: #f5e6cc;
  text-align: center;
  padding: 0 24px;
  text-shadow: 0 2px 16px rgba(0,0,0,0.3);
  line-height: 1.3;
}

/* Envelope image (closed state) */
.envelope-img {
  width: clamp(200px, 55vw, 380px);
  height: auto;
  margin-bottom: 40px;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
  animation: floatEnv 3s ease-in-out infinite;
}

@keyframes floatEnv {
  0%, 100% { transform: translateY(0);     }
  50%       { transform: translateY(-12px); }
}

/* Letter popup (opened state) */
.popup {
  position: absolute;
  width: clamp(420px, 85vw, 620px);
  height: auto;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 2;
}

.popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* Open button */
.open-btn {
  padding: clamp(11px, 2.5vw, 14px) clamp(32px, 8vw, 52px);
  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 25px;
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 700;
  cursor: pointer;
  z-index: 3;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}

.open-btn:hover, .open-btn:active {
  transform: scale(1.08);
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
}

/* Next button */
.next-btn {
  position: fixed;
  bottom: clamp(20px, 5vh, 40px);
  left: 50%;
  transform: translateX(-50%);
  padding: clamp(11px, 2.5vw, 14px) clamp(30px, 7vw, 48px);
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  display: none;
  z-index: 3;

  box-shadow: 0 0 14px rgba(255,77,109,0.7);
  animation: pulse 1.5s infinite, floatBtn 2s ease-in-out infinite;
}

.next-btn:hover { transform: translateX(-50%) scale(1.08); }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,77,109,0.6); }
  50%       { box-shadow: 0 0 28px rgba(255,77,109,1);   }
}

@keyframes floatBtn {
  0%, 100% { transform: translateX(-50%) translateY(0);    }
  50%       { transform: translateX(-50%) translateY(-6px); }
}

/* Mobile view adjustments */
@media (max-width: 480px) {
  .next-btn {
    bottom: 110px;
  }
}

/* Floating hearts */
.heart {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(0);      opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>
<body id="body">

<!-- CLOSED STATE -->
<h1 class="closed-title" id="closedTitle">Here's my whole heart for youuuuu 💖</h1>
<img src="assets/envelope.png" class="envelope-img" id="envelopeImg" alt="Envelope">
<button class="open-btn" id="openBtn" onclick="openLetter()">Opennn !</button>

<!-- OPENED STATE - Letter popup -->
<img src="assets/Letter.png" id="popup" class="popup" alt="Letter">

<!-- Next button -->
<button class="next-btn" id="nextBtn" onclick="goNext()">Next ➜</button>

<script>
function openLetter() {
  // Change background
  document.getElementById("body").classList.add("opened-bg");

  // Hide closed state elements
  document.getElementById("closedTitle").style.display = "none";
  document.getElementById("envelopeImg").style.display = "none";
  document.getElementById("openBtn").style.display     = "none";

  // Show letter popup and next button
  document.getElementById("popup").classList.add("show");
  document.getElementById("nextBtn").style.display = "block";
}

function goNext() {
  window.location.href = "gallery.html";
}

// Falling hearts animation
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.classList.add("heart");
  h.style.left   = Math.random() * 100 + "vw";
  h.style.bottom = "-30px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 350);

</script>
</body>
</html>
