<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hehe 🐶</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  position: relative;
}

/* Full-screen background */
.bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.88);
}

/* Floating hearts */
.heart {
  position: fixed;
  pointer-events: none;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(0);      opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Image */
.dog {
  width: clamp(200px, 55vw, 380px);
  height: auto;
  animation: bounce 2s infinite;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-16px); }
}

/* Back button */
.back-btn {
  margin-top: 36px;
  padding: clamp(10px, 2.5vw, 13px) clamp(28px, 7vw, 44px);
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 700;
  font-family: 'Nunito', sans-serif;

  background: linear-gradient(45deg, #f425ce, #e22aae);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;

  box-shadow: 0 0 14px rgba(244,37,206,0.55);
  animation: pulseBlue 1.5s infinite, floatBtn 2s ease-in-out infinite;
  transition: transform 0.2s;
}

.back-btn:hover, .back-btn:active { transform: scale(1.1); }

@keyframes pulseBlue {
  0%, 100% { box-shadow: 0 0 10px rgba(244,37,206,0.5); }
  50%       { box-shadow: 0 0 26px rgba(244,37,206,1);   }
}

@keyframes floatBtn {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

</style>
</head>
<body>

<img src="assets/bg7.png" class="bg" alt="">
<img src="assets/likely.png" class="dog" alt="Likely">
<button class="back-btn" onclick="goHome()">Back</button>

<script>
// Floating hearts
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.classList.add("heart");
  h.style.left     = Math.random() * 100 + "vw";
  h.style.bottom   = "-30px";
  h.style.fontSize = (Math.random() * 18 + 10) + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 350);

function goHome() {
  window.location.href = "index.html";
}
</script>
</body>
</html>
