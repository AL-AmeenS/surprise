<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("assets/bg3.jpg");
background-size:cover;
color:#f5e6cc;
font-family: Arial;
overflow:hidden;
}

.bg {
position: absolute;
width: 100%;
height: 100%;
object-fit: cover;
z-index: -1;
filter: brightness(0.9);
}

/* Confetti */
.confetti{
position:absolute;
font-size:20px;
animation: fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(800px);}
}

/* Title */
.title{
font-size:60px;
font-family:cursive;
}

/* Name */
.name{
font-size:60px;
margin-top:-30px;
font-family:cursive;
}

/* Image */

/* Text */
.text{
max-width:600px;
font-size:18px;
font-family:cursive;
}

/* Button */
.btn{
margin-top:-10px;
padding:12px 25px;
background:#f5e6cc;
color:#8b0000;
border:none;
border-radius:25px;
cursor:pointer;
font-size:18px;
}

.btn:hover{
transform:scale(1.1);
}

@media (max-width:768px){

    body{
  margin:0;
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  background: url("assets/bg3.jpg") no-repeat center center;
  background-size: cover;

  color:#f5e6cc;
  font-family: Arial;

  position: relative;
  overflow:hidden;
}

  .title{font-size:32px;}
  .name{font-size:40px;margin-top:0;}

  .text{
    font-size:26px;
    padding:0 15px;
  }

  img{
    width:200px !important;
    height:auto !important;
    margin-top:0 !important;
  }

  .btn{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);

  padding:12px 25px;
  background:#f5e6cc;
  color:#8b0000;
  border:none;
  border-radius:25px;
  cursor:pointer;
  font-size:18px;

  transition: transform 0.2s ease;
}
}
</style>
</head>

<body>

<h1 class="title" style="margin-top: -10px;">Happieee Birthdayy 🎉</h1>
<h2 class="name">Abinoooooo ❤️</h2>

<img src="assets/dog2.png" style="width: 300px;height: 300px;margin-top: -60px;">

<p class="text">
You are my favorite hooman being, my favorite footballer,  
and my best partner in hell and heaven — forever and always 💖
</p>

<button class="btn" onclick="goFinal()">Surprise 🎁</button>

}

</script>

</body>
</html>
