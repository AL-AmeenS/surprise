<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 24px 16px;

  background: url("assets/bg3.jpg") no-repeat center center;
  background-size: cover;

  color: #f5e6cc;
  overflow-x: hidden;
  position: relative;
}

/* Confetti */
.confetti {
  position: fixed;
  font-size: clamp(14px, 4vw, 22px);
  pointer-events: none;
  animation: fall 4s linear infinite;
}

@keyframes fall {
  0%   { transform: translateY(-80px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Title */
.title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(34px, 6vw, 64px);
  line-height: 1.1;
}

/* Name */
.name {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(34px, 6vw, 60px);
  margin-top: 4px;
}

/* Dog image */
.hero-img {
  width: clamp(160px, 45vw, 300px);
  height: auto;
  margin: 16px 0;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}

/* Text */
.text {
  max-width: min(600px, 90vw);
  font-family: 'Dancing Script', cursive;
  font-size: clamp(28px, 4vw, 22px);
  line-height: 1.6;
  padding: 0 8px;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: clamp(10px, 2.5vw, 14px) clamp(24px, 6vw, 36px);
  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn:hover, .btn:active {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}

</style>
</head>
<body>

<h1 class="title">Happieee Birthdayy 🎉</h1>
<h2 class="name">Abinoooooo ❤️</h2>

<img src="assets/dog2.png" class="hero-img" alt="Birthday dog">

<p class="text">
  You are my favorite hooman being, my favorite footballer,
  and my best partner in hell and heaven — forever and always 💖
</p>

<button class="btn" onclick="goFinal()">Surprise 🎁</button>

<script>
// Confetti
const emojis = ["🎉","🎊","✨","💖","🌸","🎈"];
setInterval(() => {
  let c = document.createElement("div");
  c.classList.add("confetti");
  c.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
  c.style.left          = Math.random() * 100 + "vw";
  c.style.animationDelay = (Math.random() * 2) + "s";
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 4500);
}, 300);

function goFinal() {
  window.location.href = "envelope.html";
}
</script>
</body>
</html>
