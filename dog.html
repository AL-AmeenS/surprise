<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hehe 🐶</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #e40707;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(36px, 10vw, 64px);
  color: #fff;
  margin: 0 0 16px;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
  text-align: center;
  padding: 0 16px;
}

/* Floating hearts */
.heart {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(0);      opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Dog image */
.dog {
  width: clamp(180px, 50vw, 350px);
  height: auto;
  animation: bounce 2s infinite;
  display: block;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-18px); }
}

/* Button */
.btn {
  margin-top: 32px;
  padding: clamp(10px, 2.5vw, 14px) clamp(24px, 6vw, 48px);
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 14px rgba(255,77,109,0.7);
  animation: pulse 1.5s infinite, floatBtn 2s ease-in-out infinite;
  transition: transform 0.2s;
}

.btn:hover, .btn:active { transform: scale(1.08); }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,77,109,0.6); }
  50%       { box-shadow: 0 0 28px rgba(255,77,109,1);   }
}

@keyframes floatBtn {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

</style>
</head>
<body>

<h1 class="title">Good Booyyy 🎉</h1>
<img src="assets/dog.png" class="dog" alt="Dog">
<button class="btn" onclick="nextPage()">Click Here 🎁</button>

<script>
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.classList.add("heart");
  h.style.left   = Math.random() * 100 + "vw";
  h.style.bottom = "-30px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 350);

function nextPage() {
  window.location.href = "birthday.html";
}
</script>
</body>
</html>
