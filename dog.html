<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hehe 🐶</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#e9d5c0;
overflow:hidden;
font-family: Arial;
}

.bg {
position: absolute;
width: 100%;
height: 100%;
object-fit: cover;
z-index: -1;
filter: brightness(0.9);
}

/* Floating hearts */
.heart{
position:absolute;
font-size:20px;
animation: float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

/* Dog */
.dog{
width:250px;
animation: bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* Text */


@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

/* Button */
.btn{
margin-top:50px;
padding:12px 25px;
background:#7a0c0c;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.btn:hover{
transform:scale(1.1);
}

@media (max-width:768px){
  .dog{
    width:200px !important;
    height:auto !important;
  }

  .btn {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);

  font-size: 14px;
  padding: 10px 20px;

  background: #7a0c0c;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;

  transition: transform 0.2s ease;
}  
}

</style>
</head>

<body>
<img src="assets/bg2.jpg" class="bg">

<img src="assets/dog.png" class="dog" style="height: 450px;width: 450px;">


<button class="btn" onclick="nextPage()">Click Here 🎁</button>

<script>

// floating hearts
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.classList.add("heart");
h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);
},300);

function nextPage(){
window.location.href="birthday.html";   // 👈 changed here
}
</script>

</body>
</html>
