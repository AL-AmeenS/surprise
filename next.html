<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise ❤️</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  padding: 24px 16px;
  gap: 16px;
}

h2 {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(24px, 6vw, 40px);
  color: #f5e6cc;
}

#gift {
  width: clamp(100px, 30vw, 160px);
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  filter: drop-shadow(0 0 16px rgba(255,77,109,0.5));
}

#gift:hover, #gift:active {
  transform: scale(1.18) rotate(-5deg);
}

#content {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0);    }
}

#content h1 {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(28px, 7vw, 52px);
  color: #ff8fa3;
}

#message {
  font-size: clamp(16px, 4vw, 22px);
  color: #f5e6cc;
  max-width: min(500px, 90vw);
  line-height: 1.6;
}

.photos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.photos img {
  width: clamp(100px, 28vw, 200px);
  height: auto;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(255,77,109,0.35);
  transition: transform 0.3s;
}

.photos img:hover { transform: scale(1.06) rotate(2deg); }

</style>
</head>
<body>

<h2>Click the gift 🎁</h2>
<img src="assets/gift.png" id="gift" onclick="openGift()" alt="Gift">

<div id="content">
  <h1>Happy Birthday Abinooo ❤️🎂</h1>
  <p id="message"></p>
  <div class="photos">
    <img src="assets/photo1.jpg" alt="Photo 1">
    <img src="assets/photo2.jpg" alt="Photo 2">
    <img src="assets/photo3.jpg" alt="Photo 3">
  </div>
</div>

<script>
function openGift() {
  document.getElementById("gift").style.display = "none";
  document.querySelector("h2").style.display    = "none";
  const content = document.getElementById("content");
  content.style.display = "flex";
  typeMessage();
}

const msg = "You are the best thing in my life 💖 I love you so much 🥺";
let j = 0;

function typeMessage() {
  if (j < msg.length) {
    document.getElementById("message").innerHTML += msg.charAt(j);
    j++;
    setTimeout(typeMessage, 50);
  }
}
</script>
</body>
</html>
